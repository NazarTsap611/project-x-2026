<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>День 2: Турбулентность</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="game-header">
            <h2>✈️ День 2: Турбулентность</h2>
            <div id="scoreBoard">Очки: 0 / 15</div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="320" height="440"></canvas>

            <div id="overlay" class="game-overlay">
                <h3 id="overlayTitle">🚀 Готова к полету?</h3>
                <p id="overlaySub">Уворачивайся от препятствий. Тебе нужно набрать 15 очков!</p>
                <button id="startBtn">СТАРТ</button>
            </div>

            <div id="winScreen" class="game-overlay win-style" style="display: none;">
                <h3>🎉 РУБЕЖ ПРОЙДЕН! 15/15</h3>
                <p>Ты успешно преодолела зону турбулентности с моим лицом!</p>
                
                <div class="win-photo-box">
                    <img src="../../assets/images/day2_success.jpg" alt="Победа!">
                    <p class="win-caption">» Логи зафиксировали: уровень милоты превысил критическую отметку. Летим дальше!</p>
                </div>

                <a href="../../index.html" class="back-to-hub-btn">ВЕРНУТЬСЯ В МЕНЮ</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
